<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="radiobutton.css">
</head>

<body>
    


<header>

    <h2>Hey! Read me...</h2>

<p>This is an example of what you can do with pure css to style radio buttons or checkboxes. If you are looking for a more flexible & modern way to stytle radio buttons on forms take a look at this version with svg icons. I also wrote a post</p>

</header>

<div class="container">

<h3>Your favourite thing in the world</h3>

    <form>
        <label class="custom-radio">
            <input type="radio" name="option" value="1">
            <span class="radio-btn"></span>
            Pizza
        </label>
        <br>
        <hr>
        <label class="custom-radio">
            <input type="radio" name="option" value="2">
            <span class="radio-btn"></span>
            Bacon
        </label>
        <br>
        <hr>
        <label class="custom-radio">
            <input type="radio" name="option" value="3">
            <span class="radio-btn"></span>
            Cats
            <hr>
        </label>
    </form>

<div>

</body>

</html>
